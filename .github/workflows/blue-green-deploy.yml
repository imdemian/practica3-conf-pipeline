name: Blue-Green Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Copiar plantilla y ejecutar deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cat > /tmp/nginx.conf.template << 'EOF'
            upstream backend_servers {
                server ${APP_TARGET_IP}:${APP_TARGET_PORT};
            }
            server {
                listen 80;
                server_name miprovector.com;
                location / {
                    proxy_pass http://backend_servers;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    add_header X-Deployment-Color ${DEPLOYMENT_COLOR};
                }
            }
            EOF
            sudo mv /tmp/nginx.conf.template /etc/nginx/nginx.conf.template
            sudo bash /usr/local/bin/deploy.sh

      - name: Verificar resultado
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== Estado actual ==="
            cat /etc/nginx/current_deploy.env
            echo "=== Header HTTP ==="
            curl -I http://localhost