name: CI Pipeline - Calidad, Seguridad y Carga

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # JOB 1: ANÁLISIS SAST CON SONARQUBE
  sonarQube-analysis:
    name: Análisis de Calidad de Código
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.TOKEN_SONARQUBE }}
          SONAR_HOST_URL: ${{ secrets.URL_SONARQUBE }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.qualitygate.wait=true

  # JOB 2: PRUEBAS DE CARGA CON K6
  k6-test:
    name: Pruebas de Carga K6
    runs-on: ubuntu-latest
    # Este job se ejecutará solo si el análisis de SonarQube pasa (opcional)
    needs: sonarQube-analysis 
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias Node
        run: npm install

      - name: Iniciar servidor en background
        run: npm start &

      - name: Esperar que el servidor arranque
        run: sleep 10 # Aumentado a 10s para asegurar que el servidor esté listo

      - name: Instalar K6
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Ejecutar pruebas K6 y generar reporte JSON
        run: |
          k6 run load-test.js --out json=results.json -o cloud
        env:
          K6_CLOUD_TOKEN: ${{ secrets.GRAFANA_TOKEN }}

      - name: Subir resultados como artefacto
        if: always() # Se sube incluso si las pruebas fallan
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json

name: CI/CD Pipeline - Calidad, Seguridad y Carga

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # JOB 1: ANÁLISIS SAST CON SONARQUBE
  sonarQube-analysis:
    name: Análisis de Calidad de Código
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.TOKEN_SONARQUBE }}
          SONAR_HOST_URL: ${{ secrets.URL_SONARQUBE }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.qualitygate.wait=true

  # JOB 2: BUILD Y PUSH DE IMAGEN DOCKER A GHCR
  build-and-push:
    name: Build y Push imagen Docker
    runs-on: ubuntu-latest
    needs: sonarQube-analysis
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # JOB 3: DESPLIEGUE AL SERVIDOR VÍA SSH
  deploy:
    name: Despliegue en Servidor Cloud
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            docker run -d \
              --name my-node-app \
              -p 80:3000 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

  # JOB 4: PRUEBAS DE CARGA CON K6
  k6-test:
    name: Pruebas de Carga K6
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias Node
        run: npm install

      - name: Iniciar servidor en background
        run: npm start &

      - name: Esperar que el servidor arranque
        run: sleep 10

      - name: Instalar K6
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Ejecutar pruebas K6
        run: k6 run load-test.js --out json=results.json
        env:
          K6_CLOUD_TOKEN: ${{ secrets.GRAFANA_TOKEN }}

      - name: Subir resultados como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json
